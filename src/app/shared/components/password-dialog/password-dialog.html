<div class="dialog-container">
  <!-- Header -->
  <div class="dialog-header">
    <h2>Set new password</h2>
    <img src="assets/Ic_Close_24x24.png" alt="close" class="close-icon" (click)="onClose()" />
  </div>

  <!-- Form -->
  <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()">
    <!-- New Password -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="newPassword">
      <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <!-- Confirm Password -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm new password</mat-label>
      <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword">
      <button type="button" mat-icon-button matSuffix (click)="hideConfirm = !hideConfirm">
        <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <!-- Password rules -->
    <div class="password-rules">
  <p>Password should have at least:</p>
  <ul>
    <li [class.valid]="passwordRules.length">8-15 characters</li>
    <li [class.valid]="passwordRules.digitAndLetter">1 Alphabet + 1 Numeric digit</li>
    <li [class.valid]="passwordRules.lowerUpper">1 Lower + Upper case</li>
    <li [class.valid]="passwordRules.specialChar">One special character !@#$%^&*()_</li>
  </ul>
</div>

    <!-- Submit -->
    <button mat-raised-button color="primary" class="submit-btn" [disabled]="passwordForm.invalid">
      Submit
    </button>
  </form>
</div>
