<div>
<mat-sidenav-container class="sidenav-container">
  <mat-sidenav mode="side" opened>
    <mat-nav-list class="sidenav-list">
      <a mat-list-item class="items-list" *ngFor="let item of menuItems" [routerLink]="item.route">
        <mat-icon class="icon-list">{{ item.icon }}</mat-icon>
        <span class="items">{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
</mat-sidenav-container>
</div>
